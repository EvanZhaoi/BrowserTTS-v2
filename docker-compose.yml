services:
  tts:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5001:5001"
    volumes:
      # 挂载随代码提交的语音模型目录（无需在线下载）
      - ./server/voices:/app/voices
    environment:
      - MAX_TEXT_LENGTH=1000
      - PIPER_BIN=/usr/local/piper/piper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3